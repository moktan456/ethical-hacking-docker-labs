version: '3.9'
services:
  proxy:
    image: haproxy:1
    container_name: proxy
    restart: always
    ports:
      - 14500:14500
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:Z
    networks:
      custom_network:
        ipv4_address: 10.10.1.2

  wireshark:
    image: "ffeldhaus/wireshark:0.5"
    container_name: wireshark
    restart: always
    privileged: true
    network_mode: "service:proxy"
    environment:
      - XPRA_PW=wireshark
    volumes:
      - ./data:/home/wireshark

  # NOTE: michaelborck/secutils was retired from Docker Hub (image no longer
  # exists — `docker compose up` would fail here). Replaced with LinuxServer's
  # webtop image, which serves the same purpose (browser-accessible desktop
  # for a GUI "admin box"). Same port/credentials as before so the lab docs
  # still apply. The CTF root flag is now delivered via a mounted file instead
  # of the dead image's custom entrypoint.
  secutils:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: secutils
    security_opt:
      - seccomp:unconfined
    shm_size: "1gb"
    ports:
      - "6080:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CUSTOM_USER=root
      - PASSWORD=rootpassword
    volumes:
      - ./data:/root/Desktop/data
      - ./secutils-flag/root.txt:/root/root.txt:ro
      - ./secutils-init:/custom-cont-init.d:ro
    networks:
      custom_network:
        ipv4_address: 10.10.1.5

  attacker:
    image: ethical-base
    container_name: week1-attacker
    stdin_open: true
    tty: true
    networks:
      - custom_network
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined

networks:
  custom_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.10.1.0/24
