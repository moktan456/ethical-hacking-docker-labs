# Week 10 — Kali VM mode
# Run with: make run-week10-kali
# Access targets from your Kali VM at HOST_IP:<port>
#   Recon web:     HOST_IP:10080  (→ 10.10.10.10:80)
#   SSH (lowpriv): HOST_IP:10022  (→ 10.10.10.11:22)
#   Vuln service:  HOST_IP:10999  (→ 10.10.10.11:9999)

services:
  week10-web-recon:
    image: nginx:alpine
    container_name: week10-web-recon
    hostname: recon-web
    networks:
      week10-exploitnet:
        ipv4_address: 10.10.10.10
    volumes:
      - ./recon-web:/usr/share/nginx/html:ro
    ports:
      - "10080:80"
    restart: unless-stopped

  week10-vuln-target:
    image: ubuntu:22.04
    container_name: week10-vuln-target
    hostname: vuln-target
    environment:
      - DEBIAN_FRONTEND=noninteractive
    networks:
      week10-exploitnet:
        ipv4_address: 10.10.10.11
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./target-files:/opt/target:ro
    ports:
      - "10022:22"
      - "10999:9999"
    command: >
      /bin/bash -c "
      apt-get update -qq &&
      apt-get install -y -q gcc openssh-server &&
      mkdir -p /var/run/sshd &&
      ssh-keygen -A &&
      useradd -m -s /bin/bash lowpriv &&
      echo 'lowpriv:lowpriv123' | chpasswd &&
      echo 'flag{w10_ssh_initial_access}' > /home/lowpriv/user.txt &&
      chown lowpriv:lowpriv /home/lowpriv/user.txt &&
      echo 'flag{w10_buffer_overflow_rce}' > /root/root.txt &&
      sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      /usr/sbin/sshd &&
      cp /opt/target/vuln.c /tmp/vuln.c &&
      gcc -o /opt/vuln /tmp/vuln.c -fno-stack-protector -z execstack -no-pie &&
      /opt/vuln"
    restart: unless-stopped

networks:
  week10-exploitnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
