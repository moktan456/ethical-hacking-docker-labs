version: '3.9'
services:
  wireshark:
    image: lscr.io/linuxserver/wireshark:latest
    container_name: week3-wireshark
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ../../data/caps:/caps:ro  # Shared packet captures
    ports:
      - 3000:3000
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    networks:
      traffic_net:
        ipv4_address: 10.10.3.2
    restart: unless-stopped

  sample-target:
    image: nicolaka/netshoot
    container_name: week3-target
    command: >
      /bin/bash -c "
      mkdir -p /tmp/flags &&
      echo 'flag{w3_wireshark_scope_expert}' > /tmp/flags/user.txt &&
      echo 'ZmxhZ3t3M190YXJnZXRfc2VydmljZV9mb3VuZH0=' > /tmp/flags/root_b64.txt &&
      cd /tmp && python3 -m http.server 8888 2>/dev/null &
      tail -f /dev/null"
    networks:
      traffic_net:
        ipv4_address: 10.10.3.10
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

networks:
  traffic_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.3.0/24
