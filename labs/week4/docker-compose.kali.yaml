# Week 4 — Kali VM mode
# Run with: make run-week4-kali
# Access targets from your Kali VM at HOST_IP:<port>
#   HTTP:  HOST_IP:4080  (→ 10.10.4.10:80)
#   FTP:   HOST_IP:4021  (→ 10.10.4.11:21)
#   SSH:   HOST_IP:4022  (→ 10.10.4.12:22)

services:
  week4-web:
    image: nginx:alpine
    container_name: week4-web
    hostname: web-server
    networks:
      week4-scannet:
        ipv4_address: 10.10.4.10
    volumes:
      - ./web-content:/usr/share/nginx/html:ro
    ports:
      - "4080:80"
    restart: unless-stopped

  week4-ftp:
    image: ubuntu:22.04
    container_name: week4-ftp
    hostname: ftp-server
    environment:
      - DEBIAN_FRONTEND=noninteractive
    networks:
      week4-scannet:
        ipv4_address: 10.10.4.11
    ports:
      - "4021:21"
    command: >
      /bin/bash -c "
      apt-get update -qq &&
      apt-get install -y -q vsftpd &&
      mkdir -p /var/ftp/pub /var/run/vsftpd/empty &&
      echo 'CyberCorp Internal Repository - Authorised access only.' > /var/ftp/pub/README.txt &&
      echo 'flag{w4_anon_ftp_reader}' > /var/ftp/pub/user.txt &&
      echo 'anonymous_enable=YES' > /etc/vsftpd.conf &&
      echo 'local_enable=NO' >> /etc/vsftpd.conf &&
      echo 'write_enable=NO' >> /etc/vsftpd.conf &&
      echo 'dirmessage_enable=YES' >> /etc/vsftpd.conf &&
      echo 'listen=YES' >> /etc/vsftpd.conf &&
      echo 'listen_ipv6=NO' >> /etc/vsftpd.conf &&
      echo 'anon_root=/var/ftp' >> /etc/vsftpd.conf &&
      echo 'secure_chroot_dir=/var/run/vsftpd/empty' >> /etc/vsftpd.conf &&
      echo 'ftpd_banner=CyberCorp FTP Server v3.0.5 Authorised Users Only' >> /etc/vsftpd.conf &&
      vsftpd /etc/vsftpd.conf"
    restart: unless-stopped

  week4-ssh:
    image: ubuntu:22.04
    container_name: week4-ssh
    hostname: ssh-server
    environment:
      - DEBIAN_FRONTEND=noninteractive
    networks:
      week4-scannet:
        ipv4_address: 10.10.4.12
    ports:
      - "4022:22"
    command: >
      /bin/bash -c "
      apt-get update -qq &&
      apt-get install -y -q openssh-server &&
      mkdir -p /var/run/sshd &&
      ssh-keygen -A &&
      useradd -m -s /bin/bash sysadmin &&
      echo 'sysadmin:ChangeMe2024!' | chpasswd &&
      sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      /usr/sbin/sshd -D"
    restart: unless-stopped

networks:
  week4-scannet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.4.0/24
