# Week 6 — Kali VM mode
# Run with: make run-week6-kali
# Access targets from your Kali VM at HOST_IP:<port>
#   SSH:  HOST_IP:6022  (→ 10.10.6.10:22)
#   Web:  HOST_IP:8080  (→ 10.10.6.11:80)  [already exposed in standard mode]

services:
  ssh-target:
    image: ubuntu:22.04
    container_name: ssh-target
    hostname: target-server
    environment:
      - DEBIAN_FRONTEND=noninteractive
    networks:
      week6-labnet:
        ipv4_address: 10.10.6.10
    ports:
      - "6022:22"
    command: /bin/bash -c "
      apt-get update &&
      apt-get install -y openssh-server &&
      mkdir -p /var/run/sshd &&
      ssh-keygen -A &&
      echo 'root:password123' | chpasswd &&
      useradd -m admin && echo 'admin:letmein' | chpasswd &&
      useradd -m user1 && echo 'user1:qwerty' | chpasswd &&
      mkdir -p /home/admin &&
      echo 'flag{w6_password_cracked_ssh}' > /home/admin/user.txt &&
      echo 'flag{w6_root_shell_obtained}' > /root/root.txt &&
      sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config &&
      sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      /usr/sbin/sshd -D"

  web-target:
    image: python:3.12-alpine
    container_name: web-target
    hostname: web-server
    networks:
      week6-labnet:
        ipv4_address: 10.10.6.11
    ports:
      - "8080:80"
    volumes:
      - ./web-target:/app:ro
    command: python3 /app/login_server.py

networks:
  week6-labnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.6.0/24
