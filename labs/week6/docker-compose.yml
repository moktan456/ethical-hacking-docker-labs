services:
  # Main hacking tools container
  hacking-tools:
    image: ethical-base
    container_name: password-cracking-lab
    hostname: hacklab
    stdin_open: true
    tty: true
    networks:
      - labnet
    volumes:
      - ./wordlists:/wordlists
      - ./hashes:/hashes
      - ./scripts:/scripts
    command: /bin/bash -c "
      pip3 install --break-system-packages zxcvbn &&
      echo 'Lab environment ready!' &&
      /bin/bash"
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE

  # Target SSH server for Hydra practice
  ssh-target:
    image: ubuntu:22.04
    container_name: ssh-target
    hostname: target-server
    environment:
      - DEBIAN_FRONTEND=noninteractive
    networks:
      - labnet
    command: /bin/bash -c "
      apt-get update &&
      apt-get install -y openssh-server &&
      mkdir -p /var/run/sshd &&
      ssh-keygen -A &&
      echo 'root:password123' | chpasswd &&
      useradd -m admin && echo 'admin:letmein' | chpasswd &&
      useradd -m user1 && echo 'user1:qwerty' | chpasswd &&
      sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config &&
      sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      echo 'SSH Target Server Ready' &&
      /usr/sbin/sshd -D"

  # Web target for web-based password attacks
  web-target:
    image: python:3.12-alpine
    container_name: web-target
    hostname: web-server
    networks:
      - labnet
    ports:
      - "8080:80"
    volumes:
      - ./web-target:/app:ro
    command: python3 /app/login_server.py

networks:
  labnet:
    driver: bridge
