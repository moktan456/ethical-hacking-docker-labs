# Week 7 — Kali VM mode
# Run with: make run-week7-kali
# Access targets from your Kali VM at HOST_IP:<port>
#   DVWA:      HOST_IP:7085  (→ 10.10.7.12:80)
#   Juice Shop:HOST_IP:7012  (→ 10.10.7.11:3000)
#   MySQL:     HOST_IP:7306  (→ 10.10.7.9:3306)
#   Telnet:    HOST_IP:7023  (→ 10.10.7.10:23)
#   LDAP:      HOST_IP:7389  (→ 10.10.7.7:389)

services:
  ldap:
    image: osixia/openldap
    container_name: week7-ldap
    environment:
      LDAP_ORGANISATION: "Example Organization"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "7389:389"
    networks:
      security_net:
        ipv4_address: 10.10.7.7

  mysql:
    image: mysql:latest
    container_name: week7-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "rootpassword"
      MYSQL_DATABASE: "exampledb"
      MYSQL_USER: "user"
      MYSQL_PASSWORD: "userpassword"
    ports:
      - "7306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      security_net:
        ipv4_address: 10.10.7.9

  telnet:
    image: alpine:latest
    container_name: week7-telnet
    command: >
      sh -c "apk add --no-cache busybox-extras shadow &&
      adduser -D -s /bin/sh ctfuser &&
      echo 'ctfuser:telnet123' | chpasswd &&
      mkdir -p /home/ctfuser &&
      echo 'flag{w7_telnet_protocol_breach}' > /home/ctfuser/root.txt &&
      chown ctfuser:ctfuser /home/ctfuser/root.txt &&
      /usr/sbin/telnetd -F"
    ports:
      - "7023:23"
    networks:
      security_net:
        ipv4_address: 10.10.7.10

  juice-shop:
    image: bkimminich/juice-shop
    container_name: week7-juice-shop
    ports:
      - "7012:3000"
    networks:
      security_net:
        ipv4_address: 10.10.7.11

  dvwa:
    image: vulnerables/web-dvwa
    container_name: week7-dvwa
    ports:
      - "7085:80"
    networks:
      security_net:
        ipv4_address: 10.10.7.12

networks:
  security_net:
    ipam:
      config:
        - subnet: 10.10.7.0/24
