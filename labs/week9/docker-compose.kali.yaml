# Week 9 — Kali VM mode
# Run with: make run-week9-kali
#
# The internal network (10.10.90.0/24) is intentionally NOT exposed to the host.
# You must pivot through the pivot host — exactly as in the all-Docker mode.
#
# From your Kali VM:
#   Step 1 — SSH to pivot (exposed at HOST_IP:9022):
#     ssh -p 9022 pivotuser@HOST_IP       password: pivot123
#
#   Step 2 — Set up a local port forward to reach the internal web server:
#     ssh -L 9080:10.10.90.20:80 -p 9022 pivotuser@HOST_IP -N &
#     curl http://localhost:9080/root.txt
#
#   Or use a SOCKS proxy:
#     ssh -D 1080 -p 9022 pivotuser@HOST_IP -N &
#     proxychains curl http://10.10.90.20/root.txt

services:
  week9-pivot:
    image: ubuntu:22.04
    container_name: week9-pivot
    hostname: pivot-host
    environment:
      - DEBIAN_FRONTEND=noninteractive
    networks:
      week9-external:
        ipv4_address: 10.10.9.10
      week9-internal:
        ipv4_address: 10.10.90.10
    ports:
      - "9022:22"
    command: >
      /bin/bash -c "
      apt-get update -qq &&
      apt-get install -y -q openssh-server iproute2 iptables net-tools &&
      mkdir -p /var/run/sshd &&
      ssh-keygen -A &&
      useradd -m -s /bin/bash pivotuser &&
      echo 'pivotuser:pivot123' | chpasswd &&
      echo 'flag{w9_pivot_host_accessed}' > /home/pivotuser/user.txt &&
      chown pivotuser:pivotuser /home/pivotuser/user.txt &&
      sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      echo 'AllowTcpForwarding yes' >> /etc/ssh/sshd_config &&
      echo 'PermitTunnel yes' >> /etc/ssh/sshd_config &&
      echo 'GatewayPorts yes' >> /etc/ssh/sshd_config &&
      echo 1 > /proc/sys/net/ipv4/ip_forward &&
      /usr/sbin/sshd -D"
    restart: unless-stopped

  week9-internal-web:
    image: nginx:alpine
    container_name: week9-internal-web
    hostname: internal-web
    networks:
      week9-internal:
        ipv4_address: 10.10.90.20
    volumes:
      - ./internal-web:/usr/share/nginx/html:ro
    restart: unless-stopped

  week9-internal-db:
    image: mysql:8.0
    container_name: week9-internal-db
    hostname: internal-db
    environment:
      - MYSQL_ROOT_PASSWORD=internalR00t
      - MYSQL_DATABASE=internaldb
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=apppass456
    networks:
      week9-internal:
        ipv4_address: 10.10.90.21
    restart: unless-stopped

networks:
  week9-external:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.9.0/24

  week9-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.90.0/24
